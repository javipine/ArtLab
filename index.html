<div class="contenedor-prenda">
  <img src="assets/tshirt-base.png" class="base">

</div>

<div class="controles">
  <button onclick="cambiarDiseno('diseno1.png')">Estampado Cyberpunk</button>
  <button onclick="cambiarDiseno('diseno2.png')">Estampado Minimalista</button>
</div>
<div class="shop-container">
